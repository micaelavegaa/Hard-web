<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Administrador HARD</title>
    <link rel="icon" type="image/png" href="logo.png">
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body class="admin-body">

    <div id="admin-login-overlay" class="modal-overlay" style="display: flex; background: #000; z-index: 9999;">
        <div class="modal-box" style="max-width: 350px; text-align: center; padding: 30px;">
            <h3 style="margin-bottom: 10px;">Acceso HARD</h3>
            <p style="font-size: 0.85rem; color: #666; margin-bottom: 20px;">Ingresá la clave de administrador.</p>
            <input type="password" id="admin-password-input" placeholder="Contraseña" 
                   style="width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 4px; margin-bottom: 20px; text-align: center;">
            <button onclick="verificarAcceso()" class="btn-primary-red" style="width: 100%;">Entrar</button>
        </div>
    </div>

    <div id="admin-protected-content" style="display: none;">
        <header class="admin-header">
            <div class="container header-flex">
                <div class="brand-title">
                    <h1>Panel de Productos</h1>
                    <span class="badge-count" id="total-products">Cargando...</span>
                </div>
                <div class="header-actions">
                    <button id="btn-open-modal" class="btn-primary-red">+ Nuevo Producto</button>
                </div>
            </div>
        </header>

        <main class="container main-admin">
            <div class="toolbar-card">
                <div class="search-box-admin">
                    <span class="search-icon">🔍</span>
                    <input type="text" id="admin-search" placeholder="Buscar por nombre...">
                </div>
            </div>

            <div class="table-card">
                <div class="table-responsive">
                    <table class="product-table">
                        <thead>
                            <tr>
                                <th>Producto</th>
                                <th class="text-center">Stock</th>
                                <th>Precio</th>
                                <th class="text-right">Acciones</th>
                            </tr>
                        </thead>
                        <tbody id="admin-tbody"></tbody>
                    </table>
                </div>
            </div>
        </main>

        <div id="modal-container" class="modal-overlay">
            <div class="modal-box">
                <div class="modal-header">
                    <h3>Agregar Nuevo Producto</h3>
                    <button id="btn-close-modal" class="close-btn">×</button>
                </div>
                <form id="admin-form" class="modal-form">
                    <div class="form-group">
                        <label for="p-name">Nombre del repuesto</label>
                        <input type="text" id="p-name" placeholder="Ej: Kit de Distribución" required>
                    </div>

                    <div class="form-row">
                        <div class="form-group col-half">
                            <label for="p-price">Precio de venta</label>
                            <div class="input-group-prefix">
                                <span>$</span>
                                <input type="number" id="p-price" step="0.01" placeholder="0.00" required>
                            </div>
                        </div>

                        <div class="form-group col-half">
                            <label>Stock</label>
                            <div class="input-group-prefix" style="display: flex; align-items: center;">
                                <select id="p-stock-type" onchange="toggleStockInput()" style="border:none; background:none; font-weight:600; padding:0 5px; cursor:pointer;">
                                    <option value="numero">Cant.</option>
                                    <option value="Infinito">∞ Infinito</option>
                                </select>
                                <input type="number" id="p-stock-value" placeholder="0" required style="border:none; flex:1;">
                            </div>
                        </div>
                    </div>

                    <div class="form-group">
                        <label class="file-label">Imagen del producto</label>
                        <div class="file-input-wrapper">
                            <input type="file" id="p-image" accept="image/*" required>
                        </div>
                    </div>

                    <div class="modal-footer">
                        <button type="button" id="btn-cancel" class="btn-text">Cancelar</button>
                        <button type="submit" id="btn-save" class="btn-primary-red">Guardar Producto</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script type="module" src="admin.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Administrador HARD</title>
    <link rel="icon" type="image/png" href="logo.png">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body class="admin-body">

    <div id="admin-login-overlay" class="modal-overlay" style="display: flex; background: #000; z-index: 9999;">
        <div class="modal-box" style="max-width: 350px; text-align: center; padding: 30px;">
            <h3 style="margin-bottom: 10px;">Acceso HARD</h3>
            <p style="font-size: 0.85rem; color: #666; margin-bottom: 20px;">Ingresá la clave de administrador.</p>
            <input type="password" id="admin-password-input" placeholder="Contraseña" 
                   style="width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 4px; margin-bottom: 20px; text-align: center;">
            <button onclick="verificarAcceso()" class="btn-primary-red" style="width: 100%;">Entrar</button>
        </div>
    </div>

    <div id="admin-protected-content" style="display: none;">
        <header class="admin-header">
            <div class="container header-flex">
                <div class="brand-title">
                    <h1>Panel de Productos</h1>
                    <span class="badge-count" id="total-products">Cargando...</span>
                </div>
                
                <div class="header-actions" style="display: flex; gap: 10px; align-items: center; position: relative;">
                    <button onclick="toggleConfigMenu()" style="background: #333; color: white; border: none; padding: 10px; border-radius: 6px; cursor: pointer; font-size: 1.2rem;">
                        ⚙️
                    </button>

                    <div id="config-menu" style="display: none; position: absolute; top: 55px; right: 0; background: white; border: 1px solid #ddd; padding: 20px; border-radius: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.2); z-index: 1000; width: 220px;">
                        <h4 style="margin-bottom: 10px; color: #333; font-size: 0.9rem;">Ajuste de Precios</h4>
                        <input type="number" id="porcentajeCambio" placeholder="% porcentaje" style="width: 100%; padding: 8px; margin-bottom: 10px; border: 1px solid #ccc; border-radius: 4px;">
                        <div style="display: flex; gap: 5px;">
                            <button onclick="actualizarPreciosMasivo('subir')" style="flex: 1; padding: 8px; font-size: 0.75rem; background: #2E7D32; color: white; border: none; border-radius: 4px; cursor: pointer;">Aumentar</button>
                            <button onclick="actualizarPreciosMasivo('bajar')" style="flex: 1; padding: 8px; font-size: 0.75rem; background: #D92525; color: white; border: none; border-radius: 4px; cursor: pointer;">Disminuir</button>
                        </div>
                    </div>

                    <button id="btn-open-modal" class="btn-primary-red">+ Nuevo Producto</button>
                </div>
            </div>
        </header>

        <main class="container main-admin">
            <div class="toolbar-card">
                <div class="search-box-admin">
                    <span class="search-icon">🔍</span>
                    <input type="text" id="admin-search" placeholder="Buscar por nombre...">
                </div>
            </div>

            <div class="table-card">
                <div class="table-responsive">
                    <table class="product-table">
                        <thead>
                            <tr>
                                <th>Producto</th>
                                <th class="text-center">Stock</th>
                                <th>Precio</th>
                                <th class="text-right">Acciones</th>
                            </tr>
                        </thead>
                        <tbody id="admin-tbody"></tbody>
                    </table>
                </div>
            </div>
        </main>

        <div id="modal-container" class="modal-overlay">
            <div class="modal-box">
                <div class="modal-header">
                    <h3>Agregar Nuevo Producto</h3>
                    <button id="btn-close-modal" class="close-btn">×</button>
                </div>
                <form id="admin-form" class="modal-form">
                    <div class="form-group">
                        <label for="p-name">Nombre del repuesto</label>
                        <input type="text" id="p-name" placeholder="Ej: Kit de Distribución" required>
                    </div>

                    <div style="display: flex; gap: 15px;">
                        <div class="form-group" style="flex: 1;">
                            <label for="p-price">Precio de venta</label>
                            <div class="input-group-prefix" style="display: flex; align-items: center; border: 1px solid #ccc; border-radius: 6px;">
                                <span style="padding: 10px; background: #eee;">$</span>
                                <input type="number" id="p-price" step="0.01" placeholder="0.00" required style="border: none; padding: 10px; flex: 1;">
                            </div>
                        </div>

                        <div class="form-group" style="flex: 1;">
                            <label>Stock</label>
                            <div class="input-group-prefix" style="display: flex; align-items: center; border: 1px solid #ccc; border-radius: 6px;">
                                <select id="p-stock-type" onchange="toggleStockInput()" style="border:none; background:none; padding:10px; font-weight:600; cursor:pointer;">
                                    <option value="numero">Cant.</option>
                                    <option value="Infinito">∞</option>
                                </select>
                                <input type="number" id="p-stock-value" placeholder="0" required style="border:none; padding:10px; flex:1;">
                            </div>
                        </div>
                    </div>

                    <div class="form-group">
                        <label>Imagen del producto</label>
                        <input type="file" id="p-image" accept="image/*" required style="width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 6px;">
                    </div>

                    <div class="modal-footer">
                        <button type="button" id="btn-cancel" class="btn-text">Cancelar</button>
                        <button type="submit" id="btn-save" class="btn-primary-red">Guardar Producto</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
    <div id="cropper-container" class="modal-overlay" style="z-index: 3000;">
        <div class="modal-box" style="max-width: 90%; width: 500px;">
            <div class="modal-header">
                <h3>Recortar Imagen</h3>
            </div>
            <div style="padding: 20px; max-height: 400px; overflow: hidden;">
                <img id="image-to-crop" style="max-width: 100%;">
            </div>
            <div class="modal-footer">
                <button type="button" onclick="cancelarRecorte()" class="btn-text">Cancelar</button>
                <button type="button" onclick="finalizarRecorte()" class="btn-primary-red">Cortar y Usar</button>
            </div>
        </div>
    </div>
    <script type="module" src="admin.js"></script>
</body>
</html>

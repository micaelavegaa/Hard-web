<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Administración</title>
    <link rel="icon" type="image/png" href="logo.png">
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.css">
</head>
<body class="admin-body">

    <div id="admin-login-overlay" class="modal-overlay" style="display: flex; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); align-items: center; justify-content: center; z-index: 5000;">
        <div class="modal-box" style="width: 320px; background: white; padding: 20px; border-radius: 8px;">
            <h3 style="text-align: center; margin-bottom: 15px;">Acceso al panel de Administración</h3>
            <p style="font-size: 0.85rem; color: #666; margin-bottom: 20px;">Ingresá la clave de administrador.</p>
            <input type="password" id="admin-password-input" placeholder="Ingrese la contraseña..." style="width: 100%; padding: 10px; margin-bottom: 10px; border: 1px solid #ddd;">
            <button id="btn-login-submit" class="btn-primary-red" style="width: 100%;">Acceder</button>
        </div>
    </div>

    <div id="admin-protected-content" style="display: none;">
        <header class="admin-header">
            <div class="container header-flex">
                <div class="brand-title">
                    <h1>Panel de Productos</h1>
                    <span class="badge-count" id="total-products">Cargando...</span>
                </div>
                
                <div class="header-actions" style="display: flex; gap: 10px; align-items: center; position: relative;">
                    <button onclick="toggleConfigMenu()" style="background: #333; color: white; border: none; padding: 10px; border-radius: 6px; cursor: pointer; font-size: 1.2rem;">
                        ⚙️
                    </button>

                    <div id="config-menu" style="display: none; position: absolute; top: 55px; right: 0; background: white; border: 1px solid #ddd; padding: 20px; border-radius: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.2); z-index: 1000; width: 220px;">
                        <h4 style="margin-bottom: 10px; color: #333; font-size: 0.9rem;">Ajuste de Precios</h4>
                        <input type="number" id="porcentajeCambio" placeholder="% porcentaje" style="width: 100%; padding: 8px; margin-bottom: 10px; border: 1px solid #ccc; border-radius: 4px;">
                        <div style="display: flex; gap: 5px;">
                            <button onclick="actualizarPreciosMasivo('subir')" style="flex: 1; padding: 8px; font-size: 0.75rem; background: #2E7D32; color: white; border: none; border-radius: 4px; cursor: pointer;">Aumentar</button>
                            <button onclick="actualizarPreciosMasivo('bajar')" style="flex: 1; padding: 8px; font-size: 0.75rem; background: #D92525; color: white; border: none; border-radius: 4px; cursor: pointer;">Disminuir</button>
                        </div>
                    </div>

                    <button id="btn-open-modal" class="btn-primary-red">+ Nuevo Producto</button>
                </div>
            </div>
        </header>

        <main class="container main-admin">
            <div class="toolbar-card">
                <div class="search-box-admin">
                    <span class="search-icon">🔍</span>
                    <input type="text" id="admin-search" placeholder="Buscar por nombre...">
                </div>
            </div>
            <div class="table-card" style="overflow-x: auto;">
                <table class="product-table">
                    <thead>
                        <tr>
                            <th>Producto</th>
                            <th>Stock</th>
                            <th>Precio</th>
                            <th style="text-align: right;">Acciones</th>
                        </tr>
                    </thead>
                    <tbody id="admin-tbody">
                        </tbody>
                </table>
            </div>
        </main>
    </div>

    <div id="modal-container" class="modal-overlay">
        <div class="modal-box">
            <div class="modal-header">
                <h3 id="modal-title">Nuevo Producto</h3>
                <button id="btn-close-modal" class="close-btn">&times;</button>
            </div>
            <form id="admin-form" class="modal-form">
                <div class="form-group">
                    <label>Nombre del Repuesto</label>
                    <input type="text" id="p-name" required placeholder="nombre del producto">
                </div>
                <div class="form-group">
                    <label>Código de Barras (Opcional)</label>
                    <div class="input-group-prefix">
                        <span style="font-size: 1.1rem;">▌│</span>
                        <input type="text" id="p-barcode" placeholder="Escaneá o escribí el código">
                    </div>
                </div>
                <div class="form-group">
                    <label>Precio</label>
                    <div class="input-group-prefix">
                        <span>$</span>
                        <input type="number" id="p-price" placeholder="0.00" step="0.01" required>
                    </div>
                </div>
                <div class="form-group">
                    <label>Stock</label>
                    <select id="p-stock-type" style="padding: 6px; border-radius: 4px; border: 1px solid #ddd;">
                        <option value="Manual">Manual</option>
                        <option value="Infinito">Infinito (∞)</option>
                    </select>
                    <input type="number" id="p-stock-value" placeholder="Cantidad" style="width: 100%; padding: 10px; border-radius: 4px; border: 1px solid #ddd;">
                </div>
                <div class="form-group">
                    <label>Imagen</label>
                    <input type="file" id="p-image" accept="image/*">
                    <small id="img-status" style="color: #888; display: block; margin-top: 5px;"></small>
                </div>
                <div class="modal-footer">
                    <button type="button" id="btn-cancel" class="btn-text">Cancelar</button>
                    <button type="submit" id="btn-save" class="btn-primary-red">Guardar Producto</button>
                </div>
            </form>
        </div>
    </div>

    <div id="cropper-container" class="modal-overlay" style="z-index: 6000;">
        <div class="modal-box" style="width: 400px;">
            <div style="height: 300px; background: #000; overflow: hidden;">
                <img id="image-to-crop" style="max-width: 100%;">
            </div>
            <div class="modal-footer">
                <button id="btn-crop-cancel" class="btn-text">Cancelar</button>
                <button id="btn-crop-done" class="btn-primary-red">Recortar</button>
            </div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.js"></script>
    <script type="module" src="admin.js"></script>
</body>
</html>
